name: CI & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  lint-and-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint
        run: pip install ruff && ruff check .

      - name: Deploy
        run: |
          cd /root/poll-bot
          git pull origin master
          systemctl restart poll-bot
